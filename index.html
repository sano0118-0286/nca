<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NCP 랜덤 문제 풀이</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d8deea;
      --primary: #1f6feb;
      --primary-dark: #1659c7;
      --good: #138a43;
      --bad: #c62828;
      --warn: #8a5a00;
      --soft-blue: #eef5ff;
      --soft-good: #eaf8ef;
      --soft-bad: #fff0f0;
      --shadow: 0 12px 35px rgba(20, 33, 61, .10);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #e8f1ff 0, transparent 36%), var(--bg);
      color: var(--text);
      line-height: 1.55;
    }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px 56px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 20px; }
    h1 { margin: 0 0 6px; font-size: clamp(26px, 4vw, 42px); letter-spacing: -0.04em; }
    .sub { margin: 0; color: var(--muted); }
    .pill { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; background: rgba(255,255,255,.7); color: var(--muted); font-size: 14px; white-space: nowrap; }
    .card { background: var(--card); border: 1px solid rgba(216,222,234,.9); border-radius: var(--radius); box-shadow: var(--shadow); padding: clamp(18px, 3vw, 28px); }
    .settings { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin: 18px 0; }
    label.small { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    select, button { font: inherit; }
    select { width: 100%; border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; color: var(--text); }
    button { border: 0; border-radius: 12px; padding: 12px 16px; cursor: pointer; font-weight: 700; }
    .primary { background: var(--primary); color: #fff; }
    .primary:hover { background: var(--primary-dark); }
    .secondary { background: #edf2fa; color: #1d2939; }
    .ghost { background: transparent; border: 1px solid var(--line); color: #344054; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .topbar { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom: 18px; }
    .progress { flex: 1; height: 10px; background:#edf2fa; border-radius:999px; overflow:hidden; }
    .progress > div { height:100%; background: var(--primary); width:0%; transition:.25s; }
    .stat { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; color:var(--muted); font-size:14px; }
    .qmeta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 12px; }
    .badge { font-size: 13px; border-radius: 999px; padding: 5px 10px; background: var(--soft-blue); color: #175cd3; font-weight: 700; }
    .badge.multi { background:#fff6e5; color: var(--warn); }
    .question { font-size: clamp(20px, 2.4vw, 28px); font-weight: 800; letter-spacing: -0.02em; margin: 6px 0 18px; white-space: pre-wrap; }
    .options { display: grid; gap: 10px; }
    .option {
      border: 1px solid var(--line); border-radius: 14px; padding: 14px 14px;
      display: flex; gap: 10px; align-items: flex-start; cursor: pointer; background:#fff;
      transition: border-color .15s, background .15s, transform .08s;
    }
    .option:hover { border-color: #9bbcf3; background: #fbfdff; }
    .option input { margin-top: 4px; transform: scale(1.15); }
    .option.correct { border-color: rgba(19,138,67,.55); background: var(--soft-good); }
    .option.wrong { border-color: rgba(198,40,40,.55); background: var(--soft-bad); }
    .num { min-width: 24px; font-weight: 800; color: var(--muted); }
    .feedback { margin-top: 18px; padding: 16px; border-radius: 14px; border:1px solid var(--line); display:none; }
    .feedback.good { display:block; background: var(--soft-good); border-color: rgba(19,138,67,.35); }
    .feedback.bad { display:block; background: var(--soft-bad); border-color: rgba(198,40,40,.35); }
    .feedback h3 { margin:0 0 8px; }
    .answerText { white-space: pre-wrap; }
    .hidden { display:none !important; }
    .resultGrid { display:grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin: 18px 0; }
    .resultBox { border:1px solid var(--line); border-radius:14px; padding:16px; background:#fff; }
    .resultBox b { display:block; font-size:28px; letter-spacing:-.03em; }
    .wrongList { display:grid; gap:10px; margin-top:12px; }
    .wrongItem { border:1px solid var(--line); border-radius:12px; padding:12px; background:#fff; }
    .wrongItem strong { display:block; margin-bottom:4px; }
    footer { margin-top: 16px; color: var(--muted); font-size: 13px; }
    @media (max-width: 720px) {
      header { display:block; }
      .pill { margin-top: 12px; }
      .settings, .resultGrid { grid-template-columns: 1fr; }
      .topbar { display:block; }
      .stat { justify-content:flex-start; margin-top: 10px; }
      .actions button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>NCP 랜덤 문제 풀이</h1>
        <p class="sub">첨부된 객관식 문제를 랜덤으로 섞어 풀고, 바로 정답과 해설을 확인합니다.</p>
      </div>
      <div class="pill">총 <b id="totalCount">0</b>문항 내장</div>
    </header>

    <section id="startCard" class="card">
      <h2 style="margin-top:0">풀이 설정</h2>
      <div class="settings">
        <div>
          <label class="small" for="countSelect">문제 수</label>
          <select id="countSelect">
            <option value="10">10문제</option>
            <option value="20" selected>20문제</option>
            <option value="50">50문제</option>
            <option value="all">전체 문제</option>
          </select>
        </div>
        <div>
          <label class="small" for="rangeSelect">출제 범위</label>
          <select id="rangeSelect">
            <option value="all" selected>전체</option>
            <option value="1-30">1~30번</option>
            <option value="31-60">31~60번</option>
            <option value="61-90">61~90번</option>
            <option value="91-121">91~121번</option>
          </select>
        </div>
        <div>
          <label class="small" for="shuffleSelect">순서</label>
          <select id="shuffleSelect">
            <option value="random" selected>랜덤</option>
            <option value="order">문제 번호순</option>
          </select>
        </div>
        <div>
          <label class="small" for="answerSelect">정답 확인</label>
          <select id="answerSelect">
            <option value="instant" selected>문제마다 바로 확인</option>
            <option value="end">마지막에 한 번에 채점</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button class="primary" id="startBtn">시작하기</button>
        <button class="ghost" id="singleBtn">랜덤 1문제만 풀기</button>
      </div>
      <footer>복수정답 문제는 자동으로 체크박스로 표시됩니다.</footer>
    </section>

    <section id="quizCard" class="card hidden">
      <div class="topbar">
        <div class="progress" aria-label="progress"><div id="bar"></div></div>
        <div class="stat">
          <span id="posText">0 / 0</span>
          <span>정답 <b id="scoreText">0</b></span>
          <span>오답 <b id="wrongText">0</b></span>
        </div>
      </div>
      <div class="qmeta">
        <span class="badge" id="qidBadge">문제</span>
        <span class="badge multi hidden" id="multiBadge">복수정답</span>
      </div>
      <div class="question" id="questionText"></div>
      <form class="options" id="optionsForm"></form>
      <div id="feedback" class="feedback"></div>
      <div class="actions">
        <button class="primary" id="checkBtn">정답 확인</button>
        <button class="primary hidden" id="nextBtn">다음 문제</button>
        <button class="secondary" id="skipBtn">건너뛰기</button>
        <button class="ghost" id="quitBtn">종료</button>
      </div>
    </section>

    <section id="resultCard" class="card hidden">
      <h2 style="margin-top:0">결과</h2>
      <div class="resultGrid">
        <div class="resultBox"><span>점수</span><b id="finalScore">0%</b></div>
        <div class="resultBox"><span>정답</span><b id="finalCorrect">0</b></div>
        <div class="resultBox"><span>오답</span><b id="finalWrong">0</b></div>
      </div>
      <div class="actions">
        <button class="primary" id="restartBtn">새로 풀기</button>
        <button class="secondary hidden" id="retryWrongBtn">틀린 문제 다시 풀기</button>
      </div>
      <div id="wrongWrap" class="hidden">
        <h3>틀린 문제</h3>
        <div id="wrongList" class="wrongList"></div>
      </div>
    </section>
  </div>

<script>

운영 비용)"], "correct": [3], "answerText": "OPEX (운영 비용)", "explanation": "OPEX (운영 비용)", "multiple": false}, {"id": 114, "question": "Cloud DB 상품에서 제공하고 있지 않은 DBMS는?", "options": ["Oracle", "MS-SQL", "MySQL", "Redis"], "correct": [0], "answerText": "Oracle", "explanation": "Oracle", "multiple": false}, {"id": 115, "question": "네이버 클라우드 플랫폼의 보안 상품 중 없는 상품은?", "options": ["App Safer", "Web Safer", "File Safer", "Site Safer"], "correct": [1], "answerText": "Web Safer", "explanation": "Web Safer", "multiple": false}, {"id": 116, "question": "네이버 클라우드 플랫폼의 GPU 상품에 대한 설명 중 틀린 것은?", "options": ["최대 12개의 GPU를 하나의 VM에 할당할 수 있다.", "서버를 정지시켜도 요금이 발생한다.", "Linux OS를 지원한다.", "T4, V100 등의 GPU 카드가 제공된다."], "correct": [0], "answerText": "최대 12개의 GPU를 하나의 VM에 할당할 수 있다.", "explanation": "최대 12개의 GPU를 하나의 VM에 할당할 수 있다. → 4개", "multiple": false}, {"id": 117, "question": "다음 중 오브젝트 스토리지 설명 중 틀린 것은?", "options": ["버킷 공개하기는 버킷 안의 폴더 및 파일 정보 조회 및 업로드가 가능하다.", "파일 공개하기는 파일 정보 조회 및 다운로드/업로드가 가능하다.", "버킷 권한은 목록 조회, 업로드, ACL 조회, ACL 수정이 가능하다.", "파일 권한은 다운로드, ACL 조회, ACL 수정이 가능하다."], "correct": [1], "answerText": "파일 공개하기는 파일 정보 조회 및 다운로드/업로드가 가능하다.", "explanation": "파일 공개하기는 파일 정보 조회 및 다운로드/업로드가 가능하다. → 파일 공개하기는 파일 다운로드, ACL 조회, ACL 수정 권한 중에서 선택적으로 부여 가능", "multiple": false}, {"id": 118, "question": "네이버 클라우드 플랫폼 VPC 환경에서 제공되는 GPU 서버의 특징으로 틀린 것은?", "options": ["NVDIA T4, V100 이용이 가능하다.", "서버 1대당 꽂을 수 있는 T4의 최대 개수는 2개이다.", "서버 1대당 꽂을 수 있는 V100의 최대 개수는 4개이다.", "Grid 기술을 사용할 수 있다."], "correct": [1], "answerText": "서버 1대당 꽂을 수 있는 T4의 최대 개수는 2개이다.", "explanation": "서버 1대당 꽂을 수 있는 T4의 최대 개수는 2개이다. → 4개", "multiple": false}, {"id": 119, "question": "NAS 상품 설명 중 틀린 것은?", "options": ["자체 스냅샷 기능이 제공된다.", "Linux Server와 Windows Server 모두 NAS를 마운트할 수 있습니다.", "NAS 볼륨은 네이버 클라우드 플랫폼 인프라 내에 있는 서버에서만 마운트 가능합니다.", "NAS는 용량 한도 없이 사용할 수 있다."], "correct": [3], "answerText": "NAS는 용량 한도 없이 사용할 수 있다.", "explanation": "NAS는 용량 한도 없이 사용할 수 있다. → 최소 500GB에서 최대 10TB까지", "multiple": false}, {"id": 120, "question": "다음 중 Global Route Manager의 로드밸런싱 타입이 아닌 것은?", "options": ["Weighted", "Round Robin", "Geolocation", "Source IP Hash"], "correct": [3], "answerText": "Source IP Hash", "explanation": "Source IP Hash → Round Robin, Weighted, GeoLocation, Fail Over", "multiple": false}, {"id": 121, "question": "내 서버 이미지에 대한 설명으로 틀린 것은?", "options": ["내 서버 이미지가 생성되는 동안 서버는 일시적으로 '복제중' 상태이나 서버는 정상적으로 운영된다.", "내 서버 이미지를 다른 리전으로 복제할 수 있다.", "내 서버 이미지는 오토스케일링의 Launch Configuration에서도 이용이 가능하다.", "내 서버 이미지를 이용해 서버를 생성할 때, 원본 서버의 부팅스토리지 종류와 동일하게 생성된다."], "correct": [3], "answerText": "내 서버 이미지를 이용해 서버를 생성할 때, 원본 서버의 부팅스토리지 종류와 동일하게 생성된다.", "explanation": "내 서버 이미지를 이용해 서버를 생성할 때, 원본 서버의 부팅스토리지 종류와 동일하게 생성된다.", "multiple": false}];
let pool = [];
let currentIndex = 0;
let score = 0;
let wrong = 0;
let answered = false;
let selectedAnswers = new Map();
let wrongQuestions = [];
let mode = 'instant';

const $ = (id) => document.getElementById(id);
$('totalCount').textContent = QUESTIONS.length;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function filterRange(list) {
  const range = $('rangeSelect').value;
  if (range === 'all') return list;
  const [min, max] = range.split('-').map(Number);
  return list.filter(q => q.id >= min && q.id <= max);
}

function startQuiz(single = false, customPool = null) {
  let base = customPool ? [...customPool] : filterRange(QUESTIONS);
  if ($('shuffleSelect').value === 'random' || single) base = shuffle(base);
  else base = base.sort((a,b) => a.id - b.id);

  let count = single ? 1 : $('countSelect').value;
  if (count !== 'all') base = base.slice(0, Number(count));

  pool = base;
  currentIndex = 0;
  score = 0;
  wrong = 0;
  answered = false;
  selectedAnswers = new Map();
  wrongQuestions = [];
  mode = $('answerSelect').value;

  $('startCard').classList.add('hidden');
  $('resultCard').classList.add('hidden');
  $('quizCard').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  const q = pool[currentIndex];
  $('bar').style.width = `${(currentIndex / pool.length) * 100}%`;
  $('posText').textContent = `${currentIndex + 1} / ${pool.length}`;
  $('scoreText').textContent = score;
  $('wrongText').textContent = wrong;
  $('qidBadge').textContent = `원본 ${q.id}번`;
  $('multiBadge').classList.toggle('hidden', !q.multiple);
  $('questionText').textContent = q.question;
  $('feedback').className = 'feedback';
  $('feedback').innerHTML = '';
  $('checkBtn').classList.toggle('hidden', mode === 'end');
  $('nextBtn').classList.toggle('hidden', mode !== 'end');
  $('nextBtn').textContent = currentIndex === pool.length - 1 ? '결과 보기' : '다음 문제';
  $('skipBtn').classList.toggle('hidden', mode === 'end');
  $('checkBtn').disabled = false;

  const inputType = q.multiple ? 'checkbox' : 'radio';
  $('optionsForm').innerHTML = q.options.map((opt, idx) => `
    <label class="option" data-idx="${idx}">
      <input type="${inputType}" name="answer" value="${idx}" />
      <span class="num">${idx + 1})</span>
      <span>${escapeHTML(opt)}</span>
    </label>
  `).join('');
}

function escapeHTML(str) {
  return String(str).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[ch]));
}

function getSelected() {
  return [...document.querySelectorAll('input[name="answer"]:checked')].map(el => Number(el.value)).sort((a,b)=>a-b);
}

function sameSet(a,b) {
  return a.length === b.length && a.every((v,i) => v === b[i]);
}

function gradeCurrent(showFeedback = true) {
  const q = pool[currentIndex];
  const selected = getSelected();
  if (selected.length === 0 && showFeedback) {
    alert('답을 선택해주세요.');
    return null;
  }
  const correct = [...q.correct].sort((a,b)=>a-b);
  const ok = sameSet(selected, correct);
  selectedAnswers.set(q.id, selected);

  if (showFeedback) {
    answered = true;
    document.querySelectorAll('.option').forEach(label => {
      const idx = Number(label.dataset.idx);
      if (correct.includes(idx)) label.classList.add('correct');
      if (selected.includes(idx) && !correct.includes(idx)) label.classList.add('wrong');
      label.querySelector('input').disabled = true;
    });
    const fb = $('feedback');
    fb.className = 'feedback ' + (ok ? 'good' : 'bad');
    fb.innerHTML = `
      <h3>${ok ? '정답입니다.' : '오답입니다.'}</h3>
      <div class="answerText"><b>정답:</b> ${escapeHTML(correct.map(i => q.options[i]).join(', '))}</div>
      ${q.explanation ? `<div class="answerText" style="margin-top:8px"><b>원문 해설:</b> ${escapeHTML(q.explanation)}</div>` : ''}
    `;
    $('checkBtn').classList.add('hidden');
    $('skipBtn').classList.add('hidden');
    $('nextBtn').classList.remove('hidden');
    $('nextBtn').textContent = currentIndex === pool.length - 1 ? '결과 보기' : '다음 문제';
  }
  return ok;
}

function recordAndMove() {
  const q = pool[currentIndex];
  let ok;
  if (mode === 'instant') {
    if (!answered) {
      ok = gradeCurrent(true);
      if (ok === null) return;
      if (ok) score++; else { wrong++; wrongQuestions.push(q); }
      $('scoreText').textContent = score;
      $('wrongText').textContent = wrong;
      return;
    }
  } else {
    const selected = getSelected();
    if (selected.length === 0) {
      alert('답을 선택해주세요.');
      return;
    }
    ok = gradeCurrent(false);
    if (ok) score++; else { wrong++; wrongQuestions.push(q); }
  }
  moveNext();
}

function moveNext() {
  if (currentIndex >= pool.length - 1) {
    showResult();
    return;
  }
  currentIndex++;
  renderQuestion();
}

function skipQuestion() {
  if (!answered) {
    wrong++;
    wrongQuestions.push(pool[currentIndex]);
  }
  moveNext();
}

function showResult() {
  $('bar').style.width = '100%';
  $('quizCard').classList.add('hidden');
  $('resultCard').classList.remove('hidden');
  const total = pool.length;
  const percent = total ? Math.round((score / total) * 100) : 0;
  $('finalScore').textContent = `${percent}%`;
  $('finalCorrect').textContent = `${score} / ${total}`;
  $('finalWrong').textContent = wrong;
  $('retryWrongBtn').classList.toggle('hidden', wrongQuestions.length === 0);
  $('wrongWrap').classList.toggle('hidden', wrongQuestions.length === 0);
  $('wrongList').innerHTML = wrongQuestions.map(q => `
    <div class="wrongItem">
      <strong>원본 ${q.id}번</strong>
      <div>${escapeHTML(q.question)}</div>
      <div style="margin-top:6px;color:var(--good)"><b>정답:</b> ${escapeHTML(q.correct.map(i => q.options[i]).join(', '))}</div>
    </div>
  `).join('');
}

$('startBtn').addEventListener('click', () => startQuiz(false));
$('singleBtn').addEventListener('click', () => startQuiz(true));
$('checkBtn').addEventListener('click', (e) => { e.preventDefault(); recordAndMove(); });
$('nextBtn').addEventListener('click', (e) => { e.preventDefault(); if (mode === 'end') recordAndMove(); else moveNext(); });
$('skipBtn').addEventListener('click', (e) => { e.preventDefault(); skipQuestion(); });
$('quitBtn').addEventListener('click', (e) => { e.preventDefault(); showResult(); });
$('restartBtn').addEventListener('click', () => {
  $('resultCard').classList.add('hidden');
  $('startCard').classList.remove('hidden');
});
$('retryWrongBtn').addEventListener('click', () => {
  $('answerSelect').value = 'instant';
  startQuiz(false, wrongQuestions);
});
</script>
</body>
